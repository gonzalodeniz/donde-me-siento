upstream donde_me_siento_app {
    server donde-me-siento:80;
}

# Bloque HTTP (Puerto 80)
server {
    listen 80 default_server;
    server_name gonzalodeniz.com www.gonzalodeniz.com _;

    # 1. Excepción para la validación de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Bloque HTTPS (Puerto 443)
server {
    listen 443 ssl default_server;
    http2 on;
    server_name gonzalodeniz.com www.gonzalodeniz.com _;

    # 3. Nuevas rutas apuntando a la carpeta de Certbot
    ssl_certificate /etc/letsencrypt/live/gonzalodeniz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gonzalodeniz.com/privkey.pem;
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location = /health {
        proxy_pass http://donde_me_siento_app/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://donde_me_siento_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}